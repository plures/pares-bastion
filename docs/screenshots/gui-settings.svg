<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .bg { fill: #1a1b26; }
      .sidebar-bg { fill: #16161e; }
      .card { fill: #24283b; rx: 8; }
      .title { font: bold 18px 'Segoe UI', system-ui; fill: #c0caf5; }
      .subtitle { font: 13px 'Segoe UI', system-ui; fill: #565f89; }
      .nav-active { font: bold 14px 'Segoe UI', system-ui; fill: #7aa2f7; }
      .card-title { font: bold 14px 'Segoe UI', system-ui; fill: #c0caf5; }
      .divider { stroke: #292e42; stroke-width: 1; }
      .active-indicator { fill: #7aa2f7; }
      .card-hover { fill: #292e42; rx: 4; }
      .label { font: 13px 'Segoe UI', system-ui; fill: #a9b1d6; }
      .value { font: 13px 'SF Mono', monospace; fill: #c0caf5; }
      .input-bg { fill: #1a1b26; stroke: #3b4261; rx: 4; }
      .input-text { font: 13px 'SF Mono', monospace; fill: #c0caf5; }
      .btn-primary { fill: #7aa2f7; rx: 4; }
      .btn-text { font: bold 12px 'Segoe UI', system-ui; fill: #1a1b26; }
      .btn-secondary { fill: #292e42; rx: 4; }
      .toggle-on { fill: #7aa2f7; }
      .toggle-off { fill: #3b4261; }
      .toggle-knob { fill: #c0caf5; }
      .select-bg { fill: #1a1b26; stroke: #3b4261; rx: 4; }
      .badge-green { fill: #9ece6a; }
    </style>
  </defs>

  <rect class="bg" width="900" height="520"/>

  <!-- Sidebar -->
  <rect class="sidebar-bg" x="0" y="0" width="200" height="520"/>
  <text x="24" y="36" class="title">🌐 netops</text>
  <line x1="0" y1="64" x2="200" y2="64" class="divider"/>

  <text x="40" y="93" font-size="14" fill="#565f89" font-family="Segoe UI, system-ui">📊 Dashboard</text>
  <text x="40" y="125" font-size="14" fill="#a9b1d6" font-family="Segoe UI, system-ui">📦 Inventory</text>
  <text x="40" y="157" font-size="14" fill="#a9b1d6" font-family="Segoe UI, system-ui">🔍 Scan</text>
  <text x="40" y="189" font-size="14" fill="#a9b1d6" font-family="Segoe UI, system-ui">📝 Configs</text>
  <text x="40" y="221" font-size="14" fill="#a9b1d6" font-family="Segoe UI, system-ui">💓 Health</text>

  <line x1="16" y1="480" x2="184" y2="480" class="divider"/>
  <rect class="active-indicator" x="0" y="488" width="3" height="32" rx="1"/>
  <rect class="card-hover" x="4" y="488" width="192" height="32" rx="4"/>
  <text x="40" y="509" class="nav-active">⚙️ Settings</text>

  <!-- Main -->
  <text x="224" y="44" class="title">Settings</text>
  <text x="224" y="64" class="subtitle">Manage credentials, scan configuration, and appearance.</text>

  <!-- SSH Credentials -->
  <rect class="card" x="224" y="80" width="662" height="130"/>
  <text x="248" y="108" class="card-title">🔑 SSH Credentials</text>
  <line x1="248" y1="118" x2="862" y2="118" class="divider"/>

  <text x="248" y="142" class="label">Username</text>
  <rect class="input-bg" x="248" y="148" width="200" height="28"/>
  <text x="260" y="167" class="input-text">admin</text>

  <text x="468" y="142" class="label">Auth Method</text>
  <rect class="select-bg" x="468" y="148" width="180" height="28"/>
  <text x="480" y="167" class="input-text">SSH Key ▾</text>

  <text x="668" y="142" class="label">Key File</text>
  <rect class="input-bg" x="668" y="148" width="192" height="28"/>
  <text x="680" y="167" class="input-text">~/.ssh/id_ed25519</text>

  <text x="248" y="198" class="label">Passphrase</text>
  <rect class="input-bg" x="248" y="148" width="200" height="28" y="148" style="display:none"/>

  <!-- Scan Defaults -->
  <rect class="card" x="224" y="224" width="662" height="120"/>
  <text x="248" y="252" class="card-title">🔍 Scan Defaults</text>
  <line x1="248" y1="262" x2="862" y2="262" class="divider"/>

  <text x="248" y="286" class="label">Default Concurrency</text>
  <rect class="input-bg" x="248" y="292" width="100" height="28"/>
  <text x="260" y="311" class="input-text">10</text>

  <text x="368" y="286" class="label">SSH Timeout (sec)</text>
  <rect class="input-bg" x="368" y="292" width="100" height="28"/>
  <text x="380" y="311" class="input-text">30</text>

  <text x="488" y="286" class="label">Deep Scan by default</text>
  <rect class="toggle-on" x="488" y="295" width="40" height="20" rx="10"/>
  <circle cx="518" cy="305" r="8" class="toggle-knob"/>

  <text x="548" y="286" class="label">Auto-collect configs</text>
  <rect class="toggle-off" x="548" y="295" width="40" height="20" rx="10"/>
  <circle cx="558" cy="305" r="8" class="toggle-knob"/>

  <!-- Appearance -->
  <rect class="card" x="224" y="358" width="320" height="100"/>
  <text x="248" y="386" class="card-title">🎨 Appearance</text>
  <line x1="248" y1="396" x2="520" y2="396" class="divider"/>

  <text x="248" y="420" class="label">Theme</text>
  <rect class="select-bg" x="248" y="426" width="140" height="28"/>
  <text x="260" y="445" class="input-text">Tokyo Night ▾</text>

  <text x="408" y="420" class="label">Status bar</text>
  <rect class="toggle-on" x="408" y="428" width="40" height="20" rx="10"/>
  <circle cx="438" cy="438" r="8" class="toggle-knob"/>

  <!-- Data Management -->
  <rect class="card" x="558" y="358" width="328" height="100"/>
  <text x="582" y="386" class="card-title">💾 Data Management</text>
  <line x1="582" y1="396" x2="862" y2="396" class="divider"/>

  <rect class="btn-secondary" x="582" y="412" width="120" height="28" rx="4"/>
  <text x="600" y="431" font-size="12" fill="#a9b1d6" font-family="Segoe UI, system-ui">Export Data</text>

  <rect class="btn-secondary" x="714" y="412" width="120" height="28" rx="4"/>
  <text x="732" y="431" font-size="12" fill="#a9b1d6" font-family="Segoe UI, system-ui">Import Data</text>

  <!-- Save buttons -->
  <rect class="btn-primary" x="224" y="478" width="100" height="32" rx="4"/>
  <text x="250" y="499" class="btn-text">💾 Save</text>

  <rect class="btn-secondary" x="336" y="478" width="100" height="32" rx="4"/>
  <text x="362" y="499" font-size="12" fill="#a9b1d6" font-family="Segoe UI, system-ui">Reset</text>

  <rect class="badge-green" x="452" y="484" width="60" height="20" rx="10"/>
  <text x="464" y="498" font-size="11" fill="#1a1b26" font-family="Segoe UI, system-ui" font-weight="bold">✓ Saved</text>
</svg>
